[tool.black]
line-length = 100
target-version = ["py310"]
include = '\.py$'
extend-exclude = '''
(
  /checkpoints/
| /data/
| /logs/
| /external_tools/
| /__pycache__/
)
'''

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  ".git",
  "__pycache__",
  "checkpoints",
  "data",
  "external_tools",
  "logs",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "SIM",
]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["models", "utils"]
